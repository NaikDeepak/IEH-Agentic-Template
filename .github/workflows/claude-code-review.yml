name: PR Quality Review (Free)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  pr-quality-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Type check
        id: type_check
        continue-on-error: true
        run: npm run typecheck

      - name: Unit tests
        id: unit_tests
        continue-on-error: true
        run: npm test -- --run

      - name: Post review summary
        if: ${{ always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const isForkPr = context.payload.pull_request?.head?.repo?.fork === true;
            const actor = context.actor || '';
            const isDependabot =
              actor.startsWith('dependabot') ||
              actor === 'dependabot[bot]' ||
              actor === 'dependabot-preview[bot]';

            if (isForkPr || isDependabot) {
              console.log('Skipping comment: read-only token context (fork/dependabot).');
              return;
            }

            const lintOutcome = '${{ steps.lint.outcome }}';
            const typeCheckOutcome = '${{ steps.type_check.outcome }}';
            const unitTestsOutcome = '${{ steps.unit_tests.outcome }}';

            const formatOutcome = (label, outcome) => {
              const passed = outcome === 'success';
              return `- ${label}: ${passed ? '✅ Passed' : '❌ Failed'} (${outcome})`;
            };

            const allPassed = [lintOutcome, typeCheckOutcome, unitTestsOutcome]
              .every((o) => o === 'success');
            const outcome = allPassed ? '✅ Passed' : '❌ Failed';
            const body = [
              '### Automated PR Quality Review (Free)',
              '',
              `Status: ${outcome}`,
              '',
              formatOutcome('ESLint', lintOutcome),
              formatOutcome('TypeScript typecheck', typeCheckOutcome),
              formatOutcome('Unit tests', unitTestsOutcome),
              '',
              '_This replaces Claude Code Review so PRs no longer depend on Claude API credits._'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
